<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>ID‑Generator</title>
    <style>
        body {
            font-family: monospace;
            background: #111;
            color: #0f0;
            padding: 40px;
        }
        input {
            width: 420px;
            padding: 10px;
            font-size: 18px;
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            margin-top: 10px;
            background: #0f0;
            color: #000;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #5f5;
        }
    </style>
</head>

<body>

    <h1>ID‑Generator</h1>

    <!-- Output-Feld -->
    <input id="output" type="text" placeholder="RESPO‑ID erscheint hier…" readonly>

    <br><br>

    <!-- Button -->
    <button id="generateBtn">Generate RESPO‑Name</button>

    <!-- Generator laden -->
    <script src="generator.js"></script>

    <!-- Connector -->
    <script>
        document.getElementById("generateBtn").addEventListener("click", () => {
            const id = generateRespoName();
            document.getElementById("output").value = id;
        });
    </script>
 
</body>
</html>
